<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chanakya Academy | Certificate System</title>
    <link rel="stylesheet" href="style.css">
    <!-- Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<div class="admin-panel">
    <header>
        <h1>Chanakya Academy</h1>
        <p>Certificate Generater</p>
    </header>

    <div class="grid">
        <div class="card">
            <h2>📝 Manual Entry</h2>
            <div class="form-group">
                <input id="name" placeholder="Student Full Name">
                
                <!-- Updated Level Dropdown -->
                <select id="level">
                    <option value="" disabled selected>Select Level</option>
                    <option value="Foundation Level">Foundation Level</option>
                    <option value="Level 1">Level 1</option>
                    <option value="Level 2">Level 2</option>
                    <option value="Level 3">Level 3</option>
                    <option value="Level 4">Level 4</option>
                    <option value="Level 5">Level 5</option>
                    <option value="Level 6">Level 6</option>
                    <option value="Level 7">Level 7</option>
                    <option value="Level 8">Level 8</option>
                </select>

                <!-- Proper Calendar Date Input -->
                <input type="date" id="date">
                
                <input id="code" placeholder="Student ID (ABX-10293)">
                <input id="marks" placeholder="Marks/Grade">
                
                <select id="course">
                    <option value="Abacus">Abacus</option>
                    <option value="Vedic Maths">Vedic Maths</option>
                </select>
                <button onclick="addStudent()" class="btn-primary">Add & Save Student</button>
            </div>
        </div>

        <div class="card">
            <h2>🔍 Search Records</h2>
            <input id="searchBox" oninput="searchData()" placeholder="Search by name or ID..." class="search-input">
            <div id="list" class="student-list"></div>
        </div>
    </div>

    <div id="cert-container" class="cert-wrapper" style="display:none;">
        <div id="certificate" class="certificate">
            <div class="corner-decoration top-left"></div>
            <div class="corner-decoration bottom-right"></div>
            
            <div class="cert-content">
                <div class="cert-header">CHANAKYA ACADEMY</div>
                <div class="cert-tagline">Abacus & Vedic Maths Classes</div>
                <div class="cert-motto">“The Brain Gym!”</div>

                <div class="cert-title">CERTIFICATE <span>of</span> ACHIEVEMENT</div>
                
                <p class="cert-text">This is to certify that</p>
                <h2 id="cname" class="student-name"></h2>

                <p class="cert-text">has successfully completed</p>
                <h3 id="clevel_display" class="course-detail"></h3>

                <div class="cert-meta">
                    <p>dated on <strong id="cdate"></strong></p>
                </div>

                <div class="gold-seal"></div>

                <div class="signature-block">
                    <div class="signature-line"></div>
                    <div class="designation">Director<br>Archana Kakde</div>
                </div>

                <div class="cert-footer">
                    <span>Certificate ID: <small id="ccertid"></small></span>
                    <span>Student ID: <small id="ccode"></small></span>
                </div>
            </div>
        </div>
        <button onclick="downloadPDF()" class="btn-download">📥 Download for Printing</button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
